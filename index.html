
<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>">

    <!-- Premium Typography -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover-bg: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --card-border-hover: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(15, 23, 42, 0.8);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .camp-card, .btn, .filter-btn, .conf-btn, .info-stack, .filter-select {
            transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.05) 0%, transparent 40%),
                linear-gradient(to bottom, #05070a, #0f172a);
            background-attachment: scroll;
            pointer-events: none;
        }

        /* ── Loading state ── */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; align-items: center;
            justify-content: center; z-index: 99999; flex-direction: column; gap: 16px;
        }
        #loading-overlay .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border-color);
            border-top-color: var(--accent-color); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loading-overlay p { color: var(--text-secondary); font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        header { text-align: center; padding: 40px 20px 20px; position: relative; }

        .hero-badge {
            display: inline-block; background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color); padding: 4px 14px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 600; margin-bottom: 12px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            letter-spacing: 0.05em; text-transform: uppercase;
        }

        h1 {
            font-family: 'Outfit', sans-serif; font-size: clamp(1.6rem, 6.5vw, 2.8rem);
            font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, #94a3b8 100%);

        }

        .subtitle {
            color: var(--text-secondary); font-size: 1rem; max-width: 600px;
            margin: 0 auto 15px; line-height: 1.5;
        }

        .controls-wrapper { position: sticky; top: 20px; z-index: 1000; margin-bottom: 50px; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color);
            border-radius: 24px; padding: 16px 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 16px;
        }

        @media (max-width: 768px) {
            .glass-panel {
                backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                background: rgba(15, 23, 42, 0.95);
            }
        }

        .top-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

        .filter-select {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color);
            color: #fff; padding: 12px 16px; border-radius: 14px;
            font-size: 0.85rem; font-weight: 600; outline: none;
            cursor: pointer; transition: all 0.2s; min-width: 160px;
        }
        .filter-select:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.08); }
        .filter-select option { background: #0f172a; color: #fff; }

        .search-inner { position: relative; flex-grow: 1; }

        #searchInput {

        #searchInput:focus { background: rgba(255, 255, 255, 0.08); border-color: var(--accent-color); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }

        .filter-tabs {

            border-radius: 14px; border: 1px solid var(--border-color);
            flex-wrap: wrap; gap: 6px; width: 100%;

        #conf-tabs { display: flex; flex-wrap: wrap; padding: 0; gap: 8px; margin-top: 12px; }

        .conf-btn {

        }
        .conf-btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent-color); transform: translateY(-2px); color: #fff; }
        .conf-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 8px 20px var(--accent-glow); }

        .filter-btn {
            padding: 8px 10px; border-radius: 8px; border: none;
            background: transparent; color: var(--text-secondary);
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .filter-btn.active { background: var(--accent-color); color: white; box-shadow: 0 4px 12px var(--accent-glow); }

        .stats-row { display: flex; gap: 8px; padding: 0 4px; flex-wrap: wrap; margin-top: 4px; }
        .stat-bubble {
            background: rgba(255, 255, 255, 0.04); padding: 5px 12px;
            border-radius: 100px; font-size: 0.7rem; color: var(--text-secondary);
            border: 1px solid var(--border-color); white-space: nowrap;
        }
        .stat-bubble strong { color: #fff; margin-right: 4px; }

        .human-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(34, 197, 94, 0.15); color: #4ade80;
            padding: 4px 7px; border-radius: 100px; font-size: 0.7rem;
            font-weight: 800; border: 1px solid rgba(34, 197, 94, 0.3);

            backdrop-filter: blur(4px); z-index: 10;

        @media (max-width: 768px) { .human-badge { top: 8px; right: 8px; font-size: 0.65rem; padding: 3px 8px; } }

        .camp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }

        .camp-card {
            background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color);

        .camp-card:hover { background: var(--card-hover-bg); border-color: var(--card-border-hover); transform: translateY(-5px); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .univ-name { font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: #fff; font-weight: 700; line-height: 1.2; }
        .division-tag { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; white-space: nowrap; }
        .tag-di { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .tag-dii { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }

        .conference-tag {
            background: rgba(139, 92, 246, 0.1); color: #a78bfa;
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            border: 1px solid rgba(139, 92, 246, 0.2); white-space: nowrap;
        }

        .card-right-tags { display: flex; align-items: flex-start; gap: 6px; margin-right: 48px; }
        @media (max-width: 768px) { .card-right-tags { margin-right: 44px; } }

        .info-item { display: flex; align-items: center; gap: 10px; }
        .icon-box { width: 28px; height: 28px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent-color); flex-shrink: 0; }
        .icon-box.dii { color: #a855f7; }
        .val-stack { display: flex; flex-direction: column; pointer-events: none; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; pointer-events: none; }
        .value { font-size: 0.9rem; color: #fff; font-weight: 500; pointer-events: none; }
        .value.tba { color: #fff !important; font-style: italic; pointer-events: none; opacity: 0.8; }

        .info-stack { cursor: pointer; border-radius: 12px; transition: background 0.2s; padding: 4px; margin: -4px; flex-grow: 1; }
        .info-stack:hover { background: rgba(255,255,255,0.05); }

        .badges-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; border: 1px solid transparent; }
        .badge-manual { background: rgba(34, 197, 94, 0.15); color: #4ade80; border-color: rgba(34, 197, 94, 0.3); }
        .badge-auto { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-color: rgba(59, 130, 246, 0.3); }
        .badge-partial { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border-color: rgba(245, 158, 11, 0.3); }
        .badge-not { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); border-color: var(--border-color); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 32px; max-width: 600px; width: 90%;
            max-height: 85vh; overflow-y: auto; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .close-btn {
            position: absolute; top: 16px; right: 20px; background: transparent; border: none;
            color: var(--text-secondary); font-size: 28px; cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }
        .drawer-sec { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .drawer-sec:last-child { margin-bottom: 0; }
        .d-label { font-size: 0.7rem; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        .d-body { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; }

        .tier-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.8rem; }
        .tier-table th { text-align: left; padding: 8px 10px; background: rgba(59,130,246,0.1); color: #60a5fa; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .tier-table td { padding: 8px 10px; color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: top; }
        .tier-table tr:last-child td { border-bottom: none; }
        .tier-table tr:hover td { background: rgba(255,255,255,0.03); }
        .tier-cost { color: #10b981; font-weight: 700; white-space: nowrap; }
        .tier-ages { color: #a78bfa; font-size: 0.75rem; }
        .tier-dates { color: var(--text-secondary); font-size: 0.75rem; }

        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
        @media (max-width: 480px) { .contact-grid { grid-template-columns: 1fr; } }
        .contact-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .contact-label { font-size: 0.65rem; color: var(--accent-color); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .contact-value { color: #fff; font-size: 0.8rem; font-weight: 500; word-break: break-all; }

        .date-list { margin: 0; padding-left: 18px; list-style-type: decimal; }
        .date-list li { margin-bottom: 4px; color: #fff; font-size: 0.85rem; }
        .more-dates-btn { background: none; border: none; color: var(--accent-color); font-size: 0.75rem; font-weight: 700; cursor: pointer; padding: 4px 0; display: block; margin-top: 8px; }
        .more-dates-btn:hover { text-decoration: underline; }
        .hidden-dates { display: none; }
        .hidden-dates.show { display: block; }

        .actions { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid var(--border-color); margin-top: auto; }
        .btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; text-align: center; cursor: pointer; text-decoration: none; border: none; transition: 0.2s; }
        .btn-visit { background: var(--accent-color); color: white; }
        .btn-visit:hover { background: #2563eb; }
        .btn-visit.btn-dii { background: #a855f7; }
        .btn-visit.btn-dii:hover { background: #9333ea; }
        .btn-details { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-color); }
        .btn-details:hover { background: rgba(255,255,255,0.1); }
        .btn-human-verify { background: rgba(168, 85, 247, 0.1); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
        .btn-human-verify:hover { background: rgba(168, 85, 247, 0.2); }
        .btn-human-verify.voted { background: rgba(34, 197, 94, 0.2); color: #4ade80; border-color: rgba(34, 197, 94, 0.4); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 12px;
            font-size: 0.9rem; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            border: 1px solid var(--border-color);
        }
        #toast.show { opacity: 1; }
        .desktop-text { display: inline; }
        .mobile-text { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .container { padding: 6px 6px; }
            header { padding: 0px 8px 2px; }
            h1 { font-size: 1.25rem; margin-bottom: 0; }
            .hero-badge { font-size: 0.65rem; padding: 2px 8px; margin-bottom: 2px; }
            .subtitle { font-size: 0.72rem; margin-bottom: 2px; padding: 0 8px; }
            .desktop-text { display: none; }
            .mobile-text { display: inline; }
            .controls-wrapper { top: 2px; margin-bottom: 6px; }
            .glass-panel { padding: 8px 8px; border-radius: 12px; gap: 4px; }
            .top-row { display: flex; flex-direction: row; gap: 6px; align-items: center; }
            #searchInput { padding: 6px 8px 6px 30px; font-size: 0.68rem; }
            .search-icon { left: 10px; }
            .search-icon svg { width: 14px; height: 14px; }
            .filter-select { min-width: unset; padding: 8px 10px; min-height: 44px; font-size: 0.75rem; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; }
            .filter-tabs {
                display: flex; flex-wrap: nowrap; overflow-x: auto;
                -webkit-overflow-scrolling: touch; padding: 2px; gap: 4px;
                border: none; background: transparent; width: 100%; box-sizing: border-box;
            }
            .filter-tabs::-webkit-scrollbar { display: none; }
            .filter-btn {
                white-space: nowrap; flex-shrink: 0; padding: 0 12px; min-height: 44px;
                font-size: 0.75rem; background: rgba(255,255,255,0.05);

                display: flex; justify-content: center; align-items: center; gap: 4px;
            }
            .hide-mobile { display: none; }
            #conf-tabs {
                flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
                scrollbar-width: none; margin-top: 6px; padding: 2px 0 0; gap: 4px;
            }
            #conf-tabs::-webkit-scrollbar { display: none; }
            .conf-btn { padding: 0 12px; min-height: 44px; font-size: 0.75rem; }
            #moreConfs { min-height: 44px; font-size: 0.75rem; min-width: 120px !important; }
            .stats-row {
                flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
                padding-bottom: 4px; gap: 6px; margin-top: 2px;
            }

            .modal-box { padding: 12px; width: 95%; max-height: 92vh; border-radius: 16px; }
            .drawer-sec { padding: 12px; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading camps…</p>
    </div>

    <div class="container">
        <header>
            <div class="hero-badge">Verified 2026 Season (Dev)</div>
            <h1>NCAA Baseball Camps 2026</h1>
            <p class="subtitle">
                <span class="desktop-text">521 DI & DII Programs | 87 Verified Sessions. <em>(Dynamic rendering test)</em></span>
                <span class="mobile-text">521 Schools | 87 Verified. <em>(Dev)</em></span>

        </header>

        <div class="controls-wrapper">

                        <input type="text" id="searchInput" placeholder="Search by University, Coach, or Keyword...">
                    </div>
                    <select id="costFilter" class="filter-select">
                        <option value="all">All Prices</option>
                        <option value="under150">Under $150</option>

                        <option value="under500">Under $500</option>
                        <option value="over500">$500 & Over</option>
                        <option value="tba">Price TBA</option>
                    </select>
                </div>
                <div class="filter-tabs">
                    <button class="filter-btn active" data-div="all">All</button>
                    <button class="filter-btn" data-div="DI">Div I</button>
                    <button class="filter-btn" data-div="DII">Div II</button>
                    <button class="filter-btn" data-div="newdates">📅 Latest Camp Dates</button>

                    <button class="filter-btn" data-div="human">👤 <span class="hide-mobile">Community </span>Verified</button>
                </div>
                <div id="conf-tabs">
                    <button class="conf-btn filter-btn active" data-conf="all">All Conf</button>
                    <button class="conf-btn filter-btn" data-conf="SEC">SEC</button><button class="conf-btn filter-btn" data-conf="ACC">ACC</button><button class="conf-btn filter-btn" data-conf="Big Ten">Big Ten</button><button class="conf-btn filter-btn" data-conf="Big 12">Big 12</button><button class="conf-btn filter-btn" data-conf="Sun Belt">Sun Belt</button><button class="conf-btn filter-btn" data-conf="Big West">Big West</button><button class="conf-btn filter-btn" data-conf="ASUN">ASUN</button><button class="conf-btn filter-btn" data-conf="Ivy League">Ivy League</button>
                    <select id="moreConfs" class="filter-select" style="min-width: 140px; height: 38px; padding: 0 12px; font-size: 0.75rem;">

    <script>
    // ── Human verifications seeded at build time ──
    // ── Globals ──
    let HUMAN_VERIFICATIONS = {};
    let allData = [];

    const votedInSession = JSON.parse(localStorage.getItem('votedSchools') || '[]');

    const searchInput   = document.getElementById('searchInput');

    // ── Helpers ──
    function esc(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function getLogo(item) {
        const rColors = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6'];
        const bgColor = rColors[item.university.charCodeAt(0) % rColors.length];
        const nameWords = item.university.replace(/University|College|State|Univ/gi,'').trim().split(' ').filter(p=>p);
        const initials = (nameWords.length >= 2 ? (nameWords[0][0]+nameWords[1][0]) : (item.university[0]+(item.university[1]||''))).toUpperCase();
        
        let primaryLogo = item.logoFile; // Disable Clearbit fallback to completely suppress 404 console errors
        
        if (!primaryLogo) {
            return '<div style="width:50px;height:50px;background-color:'+bgColor+';border-radius:50%;display:flex;justify-content:center;align-items:center;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.3);color:white;font-weight:800;font-size:1.2rem;">'+initials+'</div>';
        }
        // Use a class-based approach instead of unique IDs to avoid 521 different handler strings
        return '<div style="width:50px;height:50px;border-radius:50%;position:relative;flex-shrink:0;box-shadow:0 4px 10px rgba(0,0,0,0.3);">'+
            '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background-color:'+bgColor+';border-radius:50%;display:flex;justify-content:center;align-items:center;color:white;font-weight:800;font-size:1.2rem;z-index:1;">'+initials+'</div>'+
            '<div class="logo-wrap" style="position:absolute;top:0;left:0;width:100%;height:100%;background-color:#ffffff;border-radius:50%;padding:7px;display:flex;justify-content:center;align-items:center;z-index:2;">'+
            '<img src="'+esc(primaryLogo)+'" alt="Logo" style="max-width:100%;max-height:100%;object-fit:contain;" />'+
            '</div></div>';
    }

    // ── Render a single card ──
    function renderCard(item) {
        const isTba = !item.dates || item.dates === 'TBA';
        let dateArr = isTba ? [] : item.dates.split(' | ');
        dateArr = [...new Set(dateArr)].filter(d => /2026/i.test(d) || !/\d{4}/.test(d));

        let displayDatesHtml;
        if (dateArr.length === 0) {
            displayDatesHtml = 'TBA';
        } else if (dateArr.length > 2) {
            displayDatesHtml = esc(dateArr.slice(0,2).join(' | ')) + ' <span style="color:var(--text-secondary);font-size:0.8em">... (+'+(dateArr.length-2)+')</span>';
        } else {
            displayDatesHtml = esc(dateArr.join(' | '));
        }

        const tagClass   = item.division === 'DI' ? 'tag-di' : 'tag-dii';
        const accentClass = item.division === 'DI' ? '' : 'dii';
        const logoHtml   = getLogo(item);

        const isManualVerif = !!item.isVerified;
        const isAutoVerif   = !!item.autoVerified;
        const isPartial     = !!item.autoVerifiedPartial;
        const humanCount    = HUMAN_VERIFICATIONS[item.university] || 0;

        const universityEsc = esc(item.university)
            .replace(/University/g, 'Univ').replace(/Aeronautical/g, 'Aero')
            .replace(/International/g, 'Intl').replace(/Pennsylvania/g, 'Penn')
            .replace(/Washington/g, 'Wash').replace(/Institute of Technology/gi, 'Tech');

        const badgeHtml = isManualVerif
            ? '<span class="badge badge-manual">★ Manually Verified</span>'
            : (isAutoVerif || isPartial)
                ? '<span class="badge badge-auto">🤖 Automated Scan</span>'
                : '<span class="badge badge-not">❓ Not Verified</span>';

        const costVal = esc(item.cost) || 'TBA';
        const costClass = (!item.cost || item.cost === 'TBA') ? 'tba' : '';

        const contactName = (item.campPOC && item.campPOC !== 'N/A' ? esc(item.campPOC) :
                             (item.headCoach && item.headCoach !== 'N/A' ? esc(item.headCoach) : 'Athletics Office'));
        const contactEmail = (item.campPOCEmail && item.campPOCEmail !== 'N/A')
            ? '<span style="font-size:0.75rem;color:var(--accent-color);font-weight:600;opacity:0.9;">'+esc(item.campPOCEmail)+'</span>' : '';

        const humanBadgeHtml = humanCount > 0
            ? '<div class="human-badge" title="'+humanCount+' community verifications">👤 '+humanCount+'</div>' : '';

        const confTag = (item.conference && item.conference !== 'Other')
            ? '<div class="conference-tag">'+esc(item.conference)+'</div>' : '';

        const humanVerifyDisabled = votedInSession.includes(item.university);

        // ── Modal content ──
        const headCoachVal = esc(item.headCoach || 'Athletics Staff');
        const campPocVal = esc(item.campPOC || 'Provided at registration');
        const emailHtml = (item.campPOCEmail && item.campPOCEmail !== 'N/A')
            ? '<a href="mailto:'+esc(item.campPOCEmail)+'" style="color:#60a5fa;text-decoration:none;font-weight:600;">'+esc(item.campPOCEmail)+'</a>'
            : 'Check site for contact info';

        let datesHtml = '';
        if (dateArr.length > 0) {
            let extraDatesBtn = '';
            if (dateArr.length > 5) {
                extraDatesBtn = '<div class="hidden-dates"><ol class="date-list" start="6">' +
                    dateArr.slice(5).map(d => '<li>'+d+'</li>').join('') +
                    '</ol></div><button class="more-dates-btn" data-count="'+dateArr.length+'" onclick="toggleDates(this)">Show All Dates ('+dateArr.length+')</button>';
            }
            datesHtml = '<div class="drawer-sec">'+
                '<div class="d-label">📅 All Available Dates</div>'+
                '<div class="d-body">'+
                    '<ol class="date-list">' + dateArr.slice(0,5).map(d => '<li>'+d+'</li>').join('') + '</ol>' +
                    extraDatesBtn +
                '</div></div>';
        }

        // ── Tiers / Cost block ──
        let costBlock = '';
        if (item.campTiers && item.campTiers.length > 0 && !item.campTiers.every(t => t.cost === 'TBA')) {
            const rows = item.campTiers.map(t => {
                const tDates = t.sessions ? t.sessions.map(s => (s.dates||'')+(s.time?' '+s.time:'')).join('<br>') : (t.dates||'');
                return '<tr><td style="font-weight:600;color:#fff;">'+esc(t.name||'Camp')+'</td>'+
                    '<td class="tier-ages">'+esc(t.ages||'-')+'</td>'+
                    '<td class="tier-cost">'+esc(t.cost||'TBA')+'</td>'+
                    '<td class="tier-dates">'+(tDates||'TBA')+'</td></tr>';
            }).join('');
            costBlock = '<div class="drawer-sec" style="border-color:rgba(16,185,129,0.2);background:rgba(16,185,129,0.03);">'+
                '<div class="d-label" style="color:#10b981;">💰 Camp Pricing & Tiers</div>'+
                '<div class="d-body"><table class="tier-table"><thead><tr><th>Camp</th><th>Ages</th><th>Cost</th><th>Dates</th></tr></thead>'+
                '<tbody>'+rows+'</tbody></table></div></div>';
        } else if (item.cost && item.cost !== 'TBA' && item.cost !== 'Contact for pricing' && item.cost !== 'Not Listed') {
            costBlock = '<div class="drawer-sec" style="border-color:rgba(16,185,129,0.2);background:rgba(16,185,129,0.03);">'+
                '<div class="d-label" style="color:#10b981;">💰 Estimated Cost</div>'+
                '<div class="d-body" style="font-size:1.1rem;color:#10b981;font-weight:700;">'+esc(item.cost)+'</div></div>';
        } else {
            costBlock = '<div class="drawer-sec">'+
                '<div class="d-label">💰 Pricing</div>'+
                '<div class="d-body" style="color:var(--text-secondary);font-style:italic;">Cost: TBA — Check camp site for pricing details</div></div>';
        }

        const detailsHtml = item.details
            ? '<div class="drawer-sec"><div class="d-label">Additional Intel</div><div class="d-body">'+esc(item.details)+'</div></div>' : '';

        const campUrlHtml = item.campUrl
            ? '<a href="'+esc(item.campUrl)+'" target="_blank" style="color:var(--accent-color);font-weight:700;word-break:break-all;">'+esc(item.campUrl)+'</a>'
            : '<span style="color:var(--text-secondary);font-style:italic;">No camp URL available</span>';

        const updateLogHtml = (item.updateLog && item.updateLog.length > 0)
            ? '<div class="drawer-sec" style="border-left:2px solid var(--accent-color);background:rgba(59,130,246,0.02);">'+
                '<div class="d-label">Verification Roadmap & Updates</div>'+
                '<div class="d-body" style="font-size:0.75rem;">'+
                '<ul style="margin:0;padding-left:15px;list-style-type:none;">'+
                item.updateLog.slice(0,5).map(log => '<li style="margin-bottom:6px;position:relative;"><span style="position:absolute;left:-15px;color:var(--accent-color);">•</span>'+esc(log)+'</li>').join('')+
                '</ul></div></div>' : '';

        const modalHtml =
            '<div style="font-family:\'Outfit\',sans-serif;font-size:1.6rem;color:#fff;font-weight:700;margin-bottom:24px;padding-right:30px;">'+universityEsc+' Details</div>'+
            '<div class="drawer-sec" style="padding-bottom:24px;">'+
                '<div class="d-label">Staff & Contact Info</div>'+
                '<div class="contact-grid">'+
                    '<div class="contact-card"><span class="contact-label">Head Coach</span><div class="contact-value">'+headCoachVal+'</div></div>'+
                    '<div class="contact-card"><span class="contact-label">Camp POC</span><div class="contact-value">'+campPocVal+'</div></div>'+
                    '<div class="contact-card" style="grid-column:span 2;">'+
                        '<span class="contact-label">Official Email</span>'+
                        '<div class="contact-value">'+emailHtml+'</div></div>'+
                '</div></div>'+
            datesHtml +
            '<div class="drawer-sec">'+
                '<div class="d-label">Verification Source</div>'+
                '<div class="d-body" style="display:flex;gap:8px;margin-top:8px;">'+badgeHtml+'</div></div>'+
            costBlock + detailsHtml + updateLogHtml +
            '<div class="drawer-sec" style="border-color:rgba(59,130,246,0.2);background:rgba(59,130,246,0.05);">'+
                '<div class="d-label">🔗 Camp Hub</div>'+
                '<div class="d-body">'+campUrlHtml+'</div></div>'+
            '<div style="margin-top:20px;font-size:0.8rem;text-align:center;">'+
                '<a href="https://mail.google.com/mail/?view=cm&fs=1&to=rayjonesy@gmail.com&su=Camp%20Data%20Fix:%20'+encodeURIComponent(item.university)+'&body=Please%20describe%20the%20missing%20or%20incorrect%20data%20for%20'+encodeURIComponent(item.university)+'" '+
                'target="_blank" style="color:var(--danger-color);font-weight:600;text-decoration:none;border-bottom:1px dotted var(--danger-color);">'+
                '⚠️ Report Missing or Incorrect Data</a></div>';

        // ── Card attributes ──
        const hasDates = dateArr.length > 0;

        return '<div class="camp-card"'+
            ' data-div="'+item.division+'"'+
            ' data-conference="'+(item.conference||'Independent / Other')+'"'+
            ' data-cost="'+(item.cost||'TBA')+'"'+
            ' data-has-dates="'+hasDates+'"'+
            ' data-verified-manual="'+isManualVerif+'"'+
            ' data-verified-auto="'+isAutoVerif+'"'+
            ' data-verified-human="'+(humanCount > 0)+'"'+
            ' data-last-update="'+(item.lastUpdateDate||'')+'"'+
            ' data-dates-update="'+(item.datesUpdateDate||'')+'"'+
            ' data-university="'+item.university+'"'+
            ' data-not-verified="'+(!isManualVerif && !isAutoVerif && !isPartial)+'"'+
            ' data-search="'+item.university.toLowerCase()+' '+((item.campPOC||'').toLowerCase())+' '+((item.headCoach||'').toLowerCase())+'"'+
            '>' +
            humanBadgeHtml +
            '<div class="card-header">'+
                '<div style="display:flex;flex-direction:column;gap:8px;">'+
                    '<div style="display:flex;align-items:center;gap:10px;">'+logoHtml+
                        '<div class="univ-name">'+universityEsc+'</div></div>'+
                    '<div class="badges-row">'+badgeHtml+'</div>'+
                '</div>'+
                '<div class="card-right-tags">'+
                    '<div class="division-tag '+tagClass+'">'+(item.division==='DI'?'Div I':'Div II')+'</div>'+
                    confTag+
                '</div>'+
            '</div>'+
            '<div class="info-stack" onclick="openDetails(event, this, '+item.university.charCodeAt(0)+')">'+
                '<div class="info-item">'+
                    '<div class="icon-box '+accentClass+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>'+
                    '<div class="val-stack"><span class="label">Camp Dates</span><span class="value '+(isTba?'tba':'')+'">'+displayDatesHtml+'</span></div>'+
                '</div>'+
                '<div class="info-item">'+
                    '<div class="icon-box '+accentClass+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>'+
                    '<div class="val-stack"><span class="label">EST COST</span><span class="value '+costClass+'">'+costVal+'</span></div>'+
                '</div>'+
                '<div class="info-item">'+
                    '<div class="icon-box '+accentClass+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>'+
                    '<div class="val-stack"><span class="label">Camp Contact</span><span class="value">'+contactName+'</span>'+contactEmail+'</div>'+
                '</div>'+
            '</div>'+
            '<div class="modal-data" style="display:none;">'+encodeURIComponent(modalHtml)+'</div>'+
            '<div class="actions">'+
                // DO NOT BREAK: each branch builds a COMPLETE <a> tag string on one line.
                // Never close the opening tag > in a shared prefix then inject attributes via ternary.
                (function(){
                    const diiClass = item.division==='DII' ? ' btn-dii' : '';
                    if (!item.campUrl || item.campUrl.includes('google.com/search')) {
                        return '<a href="#" class="btn btn-visit'+diiClass+'" style="opacity:0.3;cursor:not-allowed;" onclick="return false;event.stopPropagation();">Visit Site</a>';
                    }
                    return '<a href="'+item.campUrl+'" class="btn btn-visit'+diiClass+'" target="_blank" onclick="event.stopPropagation()">Visit Site</a>';
                })()+
                '<button class="btn btn-human-verify'+(humanVerifyDisabled?' voted':'')+
                    '" data-verify-school="'+item.university+'"'+
                    ' '+(humanVerifyDisabled ? 'disabled' : '')+'>'+
                    '👤 <span>'+(humanCount > 0 ? humanCount : '')+'</span> Verify</button>'+
                '<button class="btn btn-details" onclick="openDetails(event, this, '+item.university.charCodeAt(0)+')">Details</button>'+
            '</div>'+
        '</div>';
    }

    // ── Open details modal (reads encoded modal content from card) ──
    const modal     = document.getElementById('globalModal');
    const modalBody = document.getElementById('modalBody');
    const closeModal = document.getElementById('closeModal');

    closeModal.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    function openDetails(event, btn, idx) {
        event.stopPropagation();
        const card = btn.closest('.camp-card');
        const md = card.querySelector('.modal-data');
        if (md) {
            modalBody.innerHTML = decodeURIComponent(md.textContent);
            const vBtn = modalBody.querySelector('.btn-human-verify');
            if (vBtn) {
                const school = vBtn.dataset.verifySchool;
                if (school && votedInSession.includes(school)) vBtn.classList.add('voted');
            }
        }
        modal.classList.add('active');
    }

    function toggleDates(btn) {
        const hidden = btn.previousElementSibling;
        if (hidden.classList.contains('show')) {
            hidden.classList.remove('show');
            btn.innerText = 'Show All Dates (' + btn.dataset.count + ')';
        } else {
            hidden.classList.add('show');
            btn.innerText = 'Show Less';
        }
    }

    // ── Logo error handling ──
    function initLogoErrorHandling() {
        document.querySelectorAll('.logo-wrap img').forEach(img => {
            img.addEventListener('error', function() {
                const wrap = this.closest('.logo-wrap');
                if (wrap) wrap.style.display = 'none';
            });
            img.addEventListener('load', function() {
                if (this.src.includes('google.com') && this.naturalWidth <= 64) {
                    const wrap = this.closest('.logo-wrap');
                    if (wrap) wrap.style.display = 'none';
                }
            });
        });
    }

    // ── Toast ──
    function showToast(msg) {
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Community Verify (reads school from data attribute) ──
    async function communityVerify(event) {
        const btn = event.target.closest('.btn-human-verify');
        if (!btn) return;
        event.stopPropagation();
        if (btn.classList.contains('voted') || btn.disabled) return;
        const schoolName = btn.dataset.verifySchool;
        if (!schoolName) return;
        if (votedInSession.includes(schoolName)) {
            btn.classList.add('voted');
            showToast("You've already verified this school.");
            return;
        }
        if (!confirm('Are you verifying that ' + schoolName + ' camp data is accurate?')) return;

        try {
            const response = await fetch('../Baseball_Camps_2026/verify_human.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ schoolName, action: 'verify' })
            });
            const result = await response.json();
            if (result.success) {
                const span = btn.querySelector('span');
                span.innerText = result.count;
                btn.classList.add('voted');
                votedInSession.push(schoolName);
                localStorage.setItem('votedSchools', JSON.stringify(votedInSession));

                const card = document.querySelector('.camp-card[data-university="' + schoolName + '"]');
                if (card) {
                    card.setAttribute('data-verified-human', 'true');
                    let badge = card.querySelector('.human-badge');
                    if (!badge) {
                        badge = document.createElement('div');
                        badge.className = 'human-badge';
                        card.insertBefore(badge, card.querySelector('.card-header'));
                    }
                    badge.innerHTML = '👤 ' + result.count;
                }
                showToast("Verified! Thank you.");
            } else {
                showToast(result.message || "Error verifying.");
            }
        } catch (err) {
            showToast("Server error.");
        }
    }

    // ── Sync verifications from server ──
    async function syncVerificationsFromServer() {
        try {
            const res = await fetch('../Baseball_Camps_2026/human_verifications.json?v=' + Date.now());
            if (!res.ok) return;
            const freshCounts = await res.json();
            document.querySelectorAll('.camp-card').forEach(card => {
                const uniName = card.getAttribute('data-university');
                let count = freshCounts[uniName] || 0;
                if (votedInSession.includes(uniName)) {
                    const badge = card.querySelector('.human-badge');
                    const currentShown = badge ? parseInt(badge.innerText.replace(/[^\d]/g, ''), 10) || 0 : 0;
                    count = Math.max(count, currentShown);
                }
                if (count > 0) {
                    let badge = card.querySelector('.human-badge');
                    if (!badge) {
                        const header = card.querySelector('.card-header');
                        badge = document.createElement('div');
                        badge.className = 'human-badge';
                        card.insertBefore(badge, header);
                    }
                    badge.innerHTML = '👤 ' + count;
                    card.setAttribute('data-verified-human', 'true');
                }
                const cardBtnSpan = card.querySelector('.btn-human-verify span');
                if (cardBtnSpan) cardBtnSpan.innerText = count > 0 ? count : '';
            });
            console.log('✅ Synchronized ' + Object.keys(freshCounts).length + ' verification records from server.');
            if (currentDiv === 'human') filter();
        } catch (e) {
            console.warn("Live sync skipped:", e);
        }
    }

    // ── Filter ──
    function filter() {
        const term = searchInput.value.toLowerCase();
        const costFilter = document.getElementById('costFilter').value;
        const confFilter = currentConf;
        let count = 0;

        const cards = campGrid.querySelectorAll('.camp-card');
        cards.forEach(card => {
            const searchTxt = (card.getAttribute('data-search') || '').toLowerCase();
            const div = card.getAttribute('data-div') || '';
            const conf = card.getAttribute('data-conference') || '';
            const cost = card.getAttribute('data-cost') || '';
            const isAuto  = card.getAttribute('data-verified-auto') === 'true';
            const isHuman = card.getAttribute('data-verified-human') === 'true';

            const matchesSearch = searchTxt.includes(term);
            let matchesFilter = true;

            if (currentDiv === 'DI' || currentDiv === 'DII') matchesFilter = div === currentDiv;
            else if (currentDiv === 'human') matchesFilter = isHuman;
            else if (currentDiv === 'updates') matchesFilter = !!card.getAttribute('data-last-update');
            else if (currentDiv === 'newdates') matchesFilter = !!card.getAttribute('data-dates-update');

            const matchesConf = (confFilter === 'all' || conf === confFilter);

            let matchesCost = true;
            if (costFilter !== 'all') {
                const priceMatches = cost.match(/\d+[\d,]*(?:\.\d+)?/g);
                const prices = priceMatches ? priceMatches.map(m => parseFloat(m.replace(/,/g, ''))) : [0];
                const maxPrice = Math.max(...prices);
                const minPrice = prices.filter(p => p > 0).length > 0 ? Math.min(...prices.filter(p => p > 0)) : 0;

                if (costFilter === 'under150') matchesCost = (minPrice > 0 && minPrice < 150);
                else if (costFilter === 'under200') matchesCost = (minPrice > 0 && minPrice < 200);
                else if (costFilter === 'under250') matchesCost = (minPrice > 0 && minPrice < 250);
                else if (costFilter === 'under300') matchesCost = (minPrice > 0 && minPrice < 300);
                else if (costFilter === 'under350') matchesCost = (minPrice > 0 && minPrice < 350);
                else if (costFilter === 'under500') matchesCost = (minPrice > 0 && minPrice < 500);
                else if (costFilter === 'over500') matchesCost = (maxPrice >= 500);
                else if (costFilter === 'tba') matchesCost = (maxPrice === 0 || cost.toLowerCase().includes('tba') || cost.toLowerCase().includes('contact'));
            }

            if (matchesSearch && matchesFilter && matchesConf && matchesCost) {
                card.style.display = 'flex';
                count++;
            } else {
                card.style.display = 'none';
            }
        });

        // SORTING RULE (DO NOT BREAK): "newdates" and "updates" ALWAYS sort by date-descending.
        // ALL other sort modes (including "All") sort alphabetically by university.
        // CRITICAL: Never add extra filter conditions (term, costFilter, confFilter) to the
        // date-sort branch — doing so causes the alphabetical else-branch to run instead,
        // breaking Latest Camp Dates / Latest Updates order. See issues.md for history.
        if (currentDiv === 'updates' || currentDiv === 'newdates') {
            const sortAttr = currentDiv === 'newdates' ? 'data-dates-update' : 'data-last-update';
            const sorted = Array.from(cards).sort((a, b) => {
                const da = a.getAttribute(sortAttr) || '';
                const db = b.getAttribute(sortAttr) || '';
                // Numeric comparison — supports both ISO timestamps and epoch ms numbers — descending (newest first)
                const ta = da ? (isNaN(Date.parse(da)) ? (Number(da) || 0) : new Date(da).getTime()) : 0;
                const tb = db ? (isNaN(Date.parse(db)) ? (Number(db) || 0) : new Date(db).getTime()) : 0;
                return tb - ta;
            });
            sorted.forEach(c => campGrid.appendChild(c));
        } else {
            // Re-sort alphabetically by university for all other views
            const sorted = Array.from(cards).sort((a, b) => {
                const ua = a.getAttribute('data-university') || '';
                const ub = b.getAttribute('data-university') || '';
                return ua.localeCompare(ub);
            });
            sorted.forEach(c => campGrid.appendChild(c));
        }

        dispCount.innerText = count;
    }

    let filterTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(filterTimeout);
        filterTimeout = setTimeout(filter, 150);
    });
    document.getElementById('costFilter').addEventListener('change', filter);

    document.querySelectorAll('.filter-tabs:not(#conf-tabs) .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-tabs:not(#conf-tabs) .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDiv = btn.getAttribute('data-div');
            filter();
        });
    });

    const moreConfsSelect = document.getElementById('moreConfs');
    document.querySelectorAll('#conf-tabs .conf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#conf-tabs .conf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentConf = btn.getAttribute('data-conf');
            moreConfsSelect.value = "none";
            filter();
        });
    });
    moreConfsSelect.addEventListener('change', () => {
        if (moreConfsSelect.value !== "none") {
            document.querySelectorAll('#conf-tabs .conf-btn').forEach(b => b.classList.remove('active'));
            currentConf = moreConfsSelect.value;
            filter();
        }
    });

    async function fetchHumanVerifications() {
        try {
            const res = await fetch('../Baseball_Camps_2026/human_verifications.json?t=' + Date.now());
            if (res.ok) {
                HUMAN_VERIFICATIONS = await res.json();
                console.log('Loaded human verifications:', Object.keys(HUMAN_VERIFICATIONS).length, 'schools (from production)');
            }
        } catch (e) {
            console.warn("Could not fetch human verifications:", e.message);
        }
    }

    // ── Boot ──
    async function init() {
        // Step 1: Fetch human verifications first so cards render with correct verified state
        await fetchHumanVerifications();

        // Step 2: Fetch camps data
        try {
            const res = await fetch('camps_data.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            allData = await res.json();
        } catch (e) {
            document.getElementById('loading-overlay').innerHTML =
                '<p style="color:#ef4444;">Failed to load camps data: ' + esc(e.message) +
                '<br><small>Make sure camps_data.json is on the server.</small></p>';
            return;
        }

        allData.sort((a, b) => a.university.localeCompare(b.university));

        // Build cards via DocumentFragment for speed
        const fragment = document.createDocumentFragment();
        const temp = document.createElement('div');
        for (let i = 0; i < allData.length; i++) {
            temp.innerHTML = renderCard(allData[i]);
            while (temp.firstChild) fragment.appendChild(temp.firstChild);
        }
        campGrid.appendChild(fragment);

        initLogoErrorHandling();

        // Wire up verify button event delegation
        campGrid.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn-human-verify');
            if (btn) communityVerify(e);
        });

        // Mark voted buttons
        document.querySelectorAll('.btn-human-verify').forEach(btn => {
            const school = btn.dataset.verifySchool;
            if (school && votedInSession.includes(school)) btn.classList.add('voted');
        });

        // Step 3: Sync fresh counts from server (may update badges after render)
        try {
            await syncVerificationsFromServer();
        } catch (e) {
            console.warn("Initial sync failed:", e);
        }

        // Hide loading
        document.getElementById('loading-overlay').style.display = 'none';
    }

    init();
    </script>
